<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FORTUNA – Page introuvable</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #050e1f; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .err-box { text-align:center; color:#fff; }
    .err-code { font-size:6rem; font-weight:700; color:#1d4ed8; line-height:1; }
    .err-msg { font-size:1.2rem; margin: 1rem 0; color:#94a3b8; }
    .err-back { color:#60a5fa; text-decoration:none; font-size:.9rem; }
  </style>
</head>
<body>
  <div class="err-box">
    <div class="err-code">404</div>
    <div class="err-msg">Page introuvable</div>
    <a href="/" class="err-back">← Retour à l'accueil</a>
  </div>
</body>
</html>
